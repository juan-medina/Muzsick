name: Release

on:
    push:
        tags:
            - 'v*.*.*'

jobs:
    build:
        name: Build ${{ matrix.rid }}
        runs-on: ${{ matrix.os }}

        strategy:
            matrix:
                include:
                    -   os: windows-latest
                        rid: win-x64
                    -   os: ubuntu-latest
                        rid: linux-x64
                    -   os: macos-latest
                        rid: osx-x64

        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup .NET
                uses: actions/setup-dotnet@v4
                with:
                    dotnet-version: '9.0.x'

            -   name: Install LibVLC (Linux)
                if: matrix.rid == 'linux-x64'
                run: sudo apt-get install -y libvlc-dev libvlc5 libvlccore9

            -   name: Cache Kokoro model
                uses: actions/cache@v4
                with:
                    path: models/KokoroModels
                    key: kokoro-model-v1

            -   name: Publish
                run: |
                    dotnet publish src/Muzsick/Muzsick.csproj \
                      -c Release \
                      -r ${{ matrix.rid }} \
                      --self-contained true \
                      /p:EnableVersionBump=false \
                      -o publish/${{ matrix.rid }}

            -   name: Zip artifact (Windows)
                if: matrix.rid == 'win-x64'
                run: Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath Muzsick-${{ github.ref_name }}-${{ matrix.rid }}.zip
                shell: pwsh

            -   name: Zip artifact (Linux / macOS)
                if: matrix.rid != 'win-x64'
                run: zip -r Muzsick-${{ github.ref_name }}-${{ matrix.rid }}.zip publish/${{ matrix.rid }}

            -   name: Upload artifact
                uses: actions/upload-artifact@v4
                with:
                    name: Muzsick-${{ matrix.rid }}
                    path: Muzsick-${{ github.ref_name }}-${{ matrix.rid }}.zip

    release:
        name: Attach to GitHub Release
        needs: build
        runs-on: ubuntu-latest

        steps:
            -   name: Download all artifacts
                uses: actions/download-artifact@v4
                with:
                    path: artifacts

            -   name: Upload to release
                run: gh release upload ${{ github.ref_name }} $(find artifacts -name "*.zip")
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    GH_REPO: ${{ github.repository }}
