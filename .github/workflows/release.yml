name: Release

on:
    push:
        tags:
            - 'v*.*.*'

jobs:
    build:
        name: Build ${{ matrix.rid }}
        runs-on: ${{ matrix.os }}

        strategy:
            matrix:
                include:
                    -   os: windows-latest
                        rid: win-x64
                    -   os: ubuntu-latest
                        rid: linux-x64
                    -   os: macos-latest
                        rid: osx-x64

        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup .NET
                uses: actions/setup-dotnet@v4
                with:
                    dotnet-version: '9.0.x'

            -   name: Install LibVLC (Linux)
                if: matrix.rid == 'linux-x64'
                shell: bash
                run: sudo apt-get install -y libvlc-dev libvlc5 libvlccore9

            -   name: Cache Kokoro model
                id: kokoro-cache
                uses: actions/cache@v4
                with:
                    path: models/KokoroModels
                    key: kokoro-model-v1

            -   name: Download Kokoro model
                if: steps.kokoro-cache.outputs.cache-hit != 'true'
                shell: bash
                run: |
                    mkdir -p models/KokoroModels
                    curl -L --fail -o models/KokoroModels/kokoro.tar.bz2 https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/kokoro-en-v0_19.tar.bz2
                    tar -xjf models/KokoroModels/kokoro.tar.bz2 -C models/KokoroModels
                    rm models/KokoroModels/kokoro.tar.bz2

            -   name: Publish
                shell: bash
                run: |
                    dotnet publish src/Muzsick/Muzsick.csproj \
                      -c Release \
                      -r ${{ matrix.rid }} \
                      --self-contained true \
                      -p:EnableVersionBump=false \
                      -o publish/${{ matrix.rid }}

            -   name: Install Velopack CLI (Windows)
                if: matrix.rid == 'win-x64'
                run: dotnet tool install -g vpk

            -   name: Pack installer (Windows)
                if: matrix.rid == 'win-x64'
                shell: pwsh
                run: |
                    $version = $env:GITHUB_REF_NAME -replace '^v', ''
                    vpk pack `
                      --packId Muzsick `
                      --packVersion $version `
                      --packDir publish/win-x64 `
                      --mainExe Muzsick.exe `
                      --outputDir velopack-out

            -   name: Zip artifact (Linux / macOS)
                if: matrix.rid != 'win-x64'
                shell: bash
                run: zip -r Muzsick-${{ github.ref_name }}-${{ matrix.rid }}.zip publish/${{ matrix.rid }}

            -   name: Upload artifact (Windows)
                if: matrix.rid == 'win-x64'
                uses: actions/upload-artifact@v4
                with:
                    name: Muzsick-win-x64
                    path: velopack-out/

            -   name: Upload artifact (Linux / macOS)
                if: matrix.rid != 'win-x64'
                uses: actions/upload-artifact@v4
                with:
                    name: Muzsick-${{ matrix.rid }}
                    path: Muzsick-${{ github.ref_name }}-${{ matrix.rid }}.zip

    release:
        name: Attach to GitHub Release
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            -   name: Download all artifacts
                uses: actions/download-artifact@v4
                with:
                    path: artifacts

            -   name: Upload to release
                shell: bash
                run: gh release upload ${{ github.ref_name }} $(find artifacts -type f)
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    GH_REPO: ${{ github.repository }}
